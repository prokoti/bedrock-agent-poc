services:
  streamlit:
    build: .
    container_name: prokoti-streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - DB_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  api:
    build: .
    container_name: prokoti-api
    command:
      - uvicorn
      - api:app
      - --host=0.0.0.0
      - --port=8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - DB_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
